<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Golf Homiez! Tracker</title>
    <script>
      (function () {
        var storageKey = 'gh_correlation_id';
        var correlationId = null;

        try {
          correlationId = window.sessionStorage.getItem(storageKey);
        } catch (e) {}

        if (!correlationId) {
          try {
            correlationId = window.crypto && typeof window.crypto.randomUUID === 'function'
              ? window.crypto.randomUUID()
              : String(Date.now()) + '-' + Math.random().toString(16).slice(2);
          } catch (e) {
            correlationId = String(Date.now()) + '-' + Math.random().toString(16).slice(2);
          }
        }

        try {
          window.sessionStorage.setItem(storageKey, correlationId);
        } catch (e) {}

        window.__ghCorrelationId = correlationId;

        function sendLog(eventType, payload) {
          try {
            var message = JSON.stringify({
              source: 'preboot',
              eventType: eventType,
              correlationId: correlationId,
              timestamp: new Date().toISOString(),
              url: window.location.href,
              path: window.location.pathname,
              userAgent: navigator.userAgent,
              viewport: { width: window.innerWidth, height: window.innerHeight },
              payload: payload || {}
            });

            if (navigator.sendBeacon) {
              var beacon = new Blob([message], { type: 'application/json' });
              if (navigator.sendBeacon('/api/client-logs', beacon)) return;
            }

            fetch('/api/client-logs', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'X-Correlation-Id': correlationId
              },
              body: message,
              credentials: 'include',
              keepalive: true
            }).catch(function () {});
          } catch (e) {}
        }

        window.__ghSendPrebootLog = sendLog;

        sendLog('html_preboot_start', {
          readyState: document.readyState,
          language: navigator.language,
          platform: navigator.platform,
          onLine: navigator.onLine,
          cookieEnabled: navigator.cookieEnabled,
          screen: { width: screen.width, height: screen.height },
          referrer: document.referrer || null
        });

        window.addEventListener('error', function (event) {
          var target = event.target;
          var isAsset = target && (target.tagName === 'SCRIPT' || target.tagName === 'LINK' || target.tagName === 'IMG');

          sendLog(isAsset ? 'asset_load_failure_preboot' : 'window_error_preboot', {
            message: event.message,
            filename: event.filename,
            lineno: event.lineno,
            colno: event.colno,
            stack: event.error && event.error.stack ? event.error.stack : null,
            tagName: target && target.tagName ? target.tagName : null,
            src: target && target.src ? target.src : (target && target.href ? target.href : null)
          });
        }, true);

        window.addEventListener('unhandledrejection', function (event) {
          var reason = event.reason || {};
          sendLog('unhandled_rejection_preboot', {
            message: reason.message || String(reason),
            stack: reason.stack || null
          });
        });

        document.addEventListener('readystatechange', function () {
          sendLog('document_readystatechange_preboot', { readyState: document.readyState });
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
